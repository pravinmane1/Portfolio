<section id="hero" class="hero" [class.revealed]="isRevealed()">
  <div class="hero-grid">
    <div class="hero-text">
      <p class="hero-label animate-in stagger-1">Software Engineer</p>
      <h1 class="hero-name animate-in stagger-2">Pravin Mane</h1>
      <p class="hero-tagline animate-in stagger-3">
        I build enterprise Angular systems<br />that scale at JP Morgan Chase.
      </p>
      <p class="hero-tech animate-in stagger-4">
        Angular &middot; TypeScript &middot; .NET Core &middot; AWS
      </p>
      <div class="hero-actions animate-in stagger-5">
        <a href="#principles" class="hero-cta">
          See my work
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 17l9.2-9.2M17 17V7H7"/></svg>
        </a>
        <a href="#connect" class="hero-link">Get in touch</a>
      </div>
    </div>
    <div class="hero-visual animate-in stagger-3">
      <div class="hero-portrait-frame">
        <img
          ngSrc="/assets/hero_image.webp"
          width="360"
          height="360"
          class="hero-portrait"
          alt="Pravin Mane"
          priority
        />
        <div class="hero-frame-border"></div>
      </div>
      <div class="hero-accent-shape"></div>
    </div>
  </div>
</section>
