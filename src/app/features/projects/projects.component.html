<section id="work" class="projects-section">
  <div class="section-header" appInView>
    <h2 class="section-title">Featured Work</h2>
    <p class="section-subtitle">Projects that demonstrate my approach to building software.</p>
  </div>

  <div class="projects-grid">
    @for (project of visibleProjects; track project.title) {
    <a
      class="project-card stagger-{{ $index + 1 }}"
      [href]="project.live"
      target="_blank"
      appInView
    >
      <div class="project-image-wrap">
        <img
          [ngSrc]="project.screenshot"
          [alt]="project.title + ' screenshot'"
          width="300"
          height="200"
          class="project-image"
        />
      </div>
      <div class="project-body">
        <h3 class="project-title">{{ project.title }}</h3>
        <p class="project-description">{{ project.description }}</p>
        <ul role="list" class="project-tech">
          @for (tech of project.techList; track tech) {
          <li>{{ tech }}</li>
          }
        </ul>
      </div>
      <span class="project-arrow">↗</span>
    </a>
    }
  </div>

  @if (hasMore) {
  <button class="show-more-btn" (click)="showMore()">
    Show More
    <span class="arrow-down">↓</span>
  </button>
  }
</section>
